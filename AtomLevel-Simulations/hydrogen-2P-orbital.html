<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hydrogen 2P Orbital</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.166/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.z = 13;

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.setPixelRatio(
    Math.min(window.devicePixelRatio,2)
);

document.body.appendChild(
    renderer.domElement
);

const particleCount = 150000;

const positions =
new Float32Array(
    particleCount*3
);

const colors =
new Float32Array(
    particleCount*3
);

let p = 0;

while(p < particleCount){

    const r =
        -Math.log(Math.random()) * 4;

    const theta =
        Math.acos(
            2*Math.random()-1
        );

    const phi =
        Math.random()*Math.PI*2;

    const probability =
        r*r *
        Math.exp(-r) *
        Math.pow(
            Math.cos(theta),
            2
        );

    if(
        Math.random() >
        probability * 0.4
    ){
        continue;
    }

    const x =
        r *
        Math.sin(theta) *
        Math.cos(phi);

    const y =
        r *
        Math.cos(theta);

    const z =
        r *
        Math.sin(theta) *
        Math.sin(phi);

    positions[p*3] = x;
    positions[p*3+1] = y;
    positions[p*3+2] = z;

    const d =
        Math.sqrt(
            x*x +
            y*y +
            z*z
        );

    const density =
        Math.exp(
            -d * 0.4
        );

    colors[p*3] =
        0.55 +
        density * 0.45;

    colors[p*3+1] =
        0.35 +
        density * 0.55;

    colors[p*3+2] =
        1.0;

    p++;
}

const geometry =
new THREE.BufferGeometry();

geometry.setAttribute(
    "position",
    new THREE.BufferAttribute(
        positions,
        3
    )
);

geometry.setAttribute(
    "color",
    new THREE.BufferAttribute(
        colors,
        3
    )
);

const material =
new THREE.PointsMaterial({

    size:0.012,

    vertexColors:true,

    transparent:true,

    opacity:0.25,

    blending:
        THREE.AdditiveBlending,

    depthWrite:false
});

const orbital =
new THREE.Points(
    geometry,
    material
);

scene.add(
    orbital
);

const nucleus =
new THREE.Mesh(

    new THREE.SphereGeometry(
        0.06,
        16,
        16
    ),

    new THREE.MeshBasicMaterial({
        color:0xffffff
    })
);

scene.add(
    nucleus
);

window.addEventListener(
    "resize",
    ()=>{

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    }
);

function animate(){

    requestAnimationFrame(
        animate
    );

    orbital.rotation.y += 0.0008;
    orbital.rotation.x += 0.00015;

    renderer.render(
        scene,
        camera
    );
}

animate();

</script>

</body>
  </html>
